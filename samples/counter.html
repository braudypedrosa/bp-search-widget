<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#1717cf",
              "background-light": "#f6f6f8",
              "background-dark": "#111121",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      /* Remove arrows from number input */
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }
    </style>
  </head>
  <body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
    <!-- Number Picker Card -->
    <div
      class="bg-white dark:bg-slate-900 p-8 rounded-xl shadow-sm border border-primary/10 flex flex-col items-center gap-6 max-w-sm w-full"
    >
      <div class="text-center">
        <h2 class="text-slate-900 dark:text-slate-100 font-semibold text-lg">
          Adjust Quantity
        </h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm">
          Select the number of items
        </p>
      </div>
      <div
        class="flex items-center justify-between w-full bg-primary/5 dark:bg-primary/10 p-2 rounded-lg border border-primary/10"
      >
        <!-- Minus Button -->
        <button
          class="flex items-center justify-center w-12 h-12 rounded-lg bg-primary text-white hover:bg-primary/90 transition-colors focus:outline-none focus:ring-2 focus:ring-primary/40"
        >
          <span class="material-symbols-outlined" data-icon="remove">remove</span>
        </button>
        <!-- Input Field -->
        <div class="flex flex-col items-center flex-1">
          <input
            aria-label="Quantity"
            class="w-full text-center bg-transparent border-none focus:ring-0 text-2xl font-bold text-slate-900 dark:text-slate-100 font-display"
            min="0"
            type="number"
            value="1"
          />
        </div>
        <!-- Plus Button -->
        <button
          class="flex items-center justify-center w-12 h-12 rounded-lg bg-primary text-white hover:bg-primary/90 transition-colors focus:outline-none focus:ring-2 focus:ring-primary/40"
        >
          <span class="material-symbols-outlined" data-icon="add">add</span>
        </button>
      </div>
      <button
        class="w-full py-3 px-4 bg-primary/10 text-primary hover:bg-primary/20 font-semibold rounded-lg transition-colors border border-primary/20"
      >
        Confirm Selection
      </button>
    </div>
  </body>
</html>
