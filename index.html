<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bp-search-widget Demo</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%23000'/%3E%3Cpath d='M20 28h24v4H20zm0 10h17v4H20zm0-20h24v4H20z' fill='white'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(0, 0, 0, 0.08), transparent 30%),
          radial-gradient(circle at bottom right, rgba(64, 64, 64, 0.08), transparent 26%),
          #f5f5f5;
        color: #111111;
      }

      .demo-shell {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 64px 0 80px;
      }

      .demo-kicker {
        margin: 0 0 10px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #404040;
      }

      .demo-title {
        margin: 0;
        font-size: clamp(2.5rem, 6vw, 4.25rem);
        line-height: 0.95;
      }

      .demo-copy {
        max-width: 720px;
        margin: 18px 0 32px;
        color: #525252;
        font-size: 18px;
        line-height: 1.6;
      }

      #widget-demo {
        width: 100%;
      }

      .demo-log {
        margin-top: 28px;
        padding: 20px;
        border: 1px solid #d4d4d4;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 18px 48px -38px rgba(0, 0, 0, 0.42);
      }

      .demo-log h2 {
        margin: 0 0 10px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #525252;
      }

      .demo-log pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 14px;
        color: #111111;
      }
    </style>
  </head>
  <body>
    <main class="demo-shell">
      <p class="demo-kicker">Demo</p>
      <h1 class="demo-title">Vacation rental search, packaged.</h1>
      <p class="demo-copy">
        This page uses the standalone <code>BPSearchWidget</code> library, with the published npm
        <code>bp-calendar</code> package powering the combined date field and a filter modal
        for secondary controls.
      </p>
      <div id="widget-demo"></div>
      <section class="demo-log">
        <h2>Latest event</h2>
        <pre id="demo-output">Interact with the widget to see callback payloads.</pre>
      </section>
    </main>

    <script type="module">
      import '@braudypedrosa/bp-calendar/styles';
      import './bp-search-widget.scss';
      import { BPSearchWidget } from './bp-search-widget.js';

      const output = document.querySelector('#demo-output');

      const writeOutput = (label, payload) => {
        output.textContent = `${label}\n${JSON.stringify(payload, null, 2)}`;
      };

      const widget = new BPSearchWidget('#widget-demo', {
        fields: [
          { label: 'Guests', type: 'select', options: ['1', '2', '3', '4+'], position: 'end', icon: 'fa-solid fa-users' },
          { label: 'Promo Code', type: 'input', position: 'start', icon: 'fa-solid fa-ticket' },
        ],
        filters: [
          { label: 'Bedrooms', type: 'counter', min: 1, max: 8, defaultValue: 2, width: '30%' },
          { label: 'View', type: 'select', options: ['Ocean', 'Garden', 'City'], width: '30%' },
          { label: 'Amenities', type: 'checkbox', options: ['Pool', 'Spa', 'Gym'] },
          { label: 'Property Type', type: 'radio', options: ['Villa', 'Cabin', 'Suite'] },
          { label: 'Pets', type: 'checkbox', options: ['Dog', 'Cat'], width: '50%' },
          { label: 'Budget', type: 'select', options: ['Under $200', '$200-$500', '$500+'] },
          { label: 'Keyword', type: 'input' },
        ],
        calendarOptions: {
          monthsToShow: 2,
          datepickerPlacement: 'auto',
        },
        onSearch: (payload) => {
          writeOutput('search', payload);
        },
        onFilterClick: (payload) => {
          writeOutput('filter', payload);
        },
      });

      window.demoWidget = widget;
    </script>
  </body>
</html>
